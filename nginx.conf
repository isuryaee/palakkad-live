# ============================================================================
# LivePalakkad Nginx Configuration
# Reverse proxy for Next.js application on livepalakkad.com
# ============================================================================
# Usage:
#   sudo cp nginx.conf /etc/nginx/sites-available/livepalakkad
#   sudo ln -s /etc/nginx/sites-available/livepalakkad /etc/nginx/sites-enabled/livepalakkad
#   sudo nginx -t
#   sudo systemctl restart nginx
#
# SSL Setup (Let's Encrypt via Certbot):
#   sudo certbot certonly --standalone -d livepalakkad.com -d www.livepalakkad.com
#   Update ssl_certificate and ssl_certificate_key paths below

# Upstream Node.js application
upstream livepalakkad_app {
  server 127.0.0.1:3000;
  keepalive 64;
}

# HTTP to HTTPS redirect
server {
  listen 80;
  listen [::]:80;
  server_name livepalakkad.com www.livepalakkad.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$server_name$request_uri;
  }
}

# HTTPS server block
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name livepalakkad.com www.livepalakkad.com;

  # SSL Certificate paths (update to your Let's Encrypt paths)
  ssl_certificate /etc/letsencrypt/live/livepalakkad.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/livepalakkad.com/privkey.pem;

  # SSL Configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/javascript text/xml text/x-component
             text/x-cross-domain-policy application/javascript application/json
             application/xml+rss application/rss+xml font/truetype font/opentype
             application/vnd.ms-fontobject image/svg+xml;
  gzip_disable "msie6";

  # Brotli compression (if installed)
  # brotli on;
  # brotli_types text/plain text/css text/javascript text/xml application/json application/javascript;

  # Logging
  access_log /var/log/nginx/livepalakkad_access.log;
  error_log /var/log/nginx/livepalakkad_error.log;

  # Root directory for public files
  root /path/to/livepalakkad/public;

  # ========================================================================
  # STATIC ASSETS - Cache in browser and Nginx
  # ========================================================================

  # Next.js static assets with long cache
  location /_next/static/ {
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Public folder assets
  location ~* ^/(?:favicon|robots|sitemap|manifest)\..*$ {
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
  }

  # Images
  location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # CSS and JavaScript
  location ~* \.(css|js)$ {
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
  }

  # Fonts
  location ~* \.(woff|woff2|ttf|otf|eot)$ {
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Uploads folder (if using local storage)
  location /uploads/ {
    alias /path/to/livepalakkad/public/uploads/;
    expires 30d;
    add_header Cache-Control "public";
  }

  # ========================================================================
  # ADMIN PANEL - No cache (dynamic content)
  # ========================================================================

  location /desk {
    proxy_pass http://livepalakkad_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_redirect off;

    # No caching for admin
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # ========================================================================
  # API ROUTES - No cache
  # ========================================================================

  location /api {
    proxy_pass http://livepalakkad_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_redirect off;

    # No caching for API
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # ========================================================================
  # AUTH ROUTES - No cache
  # ========================================================================

  location /auth {
    proxy_pass http://livepalakkad_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_redirect off;
  }

  # ========================================================================
  # PUBLIC PAGES - Cache strategy (ISR/SSR pages)
  # ========================================================================

  location / {
    proxy_pass http://livepalakkad_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_redirect off;

    # Cache public pages for 5 minutes
    add_header Cache-Control "public, max-age=300";
  }

  # ========================================================================
  # ERROR HANDLING
  # ========================================================================

  error_page 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}

# ============================================================================
# RATE LIMITING (optional - add to limit API/admin abuse)
# ============================================================================

# Uncomment to enable rate limiting on admin login:
# limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/m;
#
# Then add to /desk location:
#   limit_req zone=admin_limit burst=10 nodelay;
